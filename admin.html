<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#1a7a3a"/>
<title>إدارة المدرسة — خطتي الفصلية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#f4f0eb;--surface:#fff;--card:#f9f6f2;--border:#d8ccc4;
  --green:#1a7a3a;--green2:#27ae60;--gold:#b8860b;--red:#c0392b;--red2:#e74c3c;
  --text:#2a1a1a;--muted:#7a6060;
}
html{-webkit-text-size-adjust:100%;}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overscroll-behavior-y:contain;
  background-image:linear-gradient(rgba(26,122,58,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(26,122,58,.04) 1px,transparent 1px);background-size:36px 36px;}
@media(max-width:767px){input,select{font-size:16px !important;}}
button{font-family:'Cairo',sans-serif;cursor:pointer;}

.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:32px 24px;width:100%;max-width:380px;box-shadow:0 10px 40px rgba(0,0,0,.08);}
.login-logo{width:64px;height:64px;margin:0 auto 16px;background:linear-gradient(135deg,var(--green),var(--green2));border-radius:18px;display:flex;align-items:center;justify-content:center;}
.login-title{text-align:center;font-size:22px;font-weight:900;margin-bottom:4px;}
.login-sub{text-align:center;font-size:13px;color:var(--muted);margin-bottom:24px;}
.login-field{margin-bottom:14px;}
.login-field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:700;}
.login-field input{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:12px;font-family:'Cairo',sans-serif;font-size:14px;outline:none;transition:border .2s;}
.login-field input:focus{border-color:var(--green);}
.login-btn{width:100%;background:linear-gradient(135deg,var(--green),var(--green2));color:#fff;border:none;border-radius:10px;padding:13px;font-family:'Cairo',sans-serif;font-size:15px;font-weight:800;cursor:pointer;transition:opacity .2s;}
.login-btn:disabled{opacity:.6;cursor:not-allowed;}
.login-err{background:rgba(192,57,43,.1);border:1px solid rgba(192,57,43,.3);color:var(--red);border-radius:8px;padding:10px;font-size:13px;margin-bottom:14px;text-align:center;display:none;}

.dash{display:none;min-height:100vh;}
.dash-header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;padding-top:max(14px,env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:20;backdrop-filter:blur(10px);}
.dash-school{font-size:16px;font-weight:900;display:flex;align-items:center;gap:8px;}
.dash-logout{background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:8px 14px;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}

.main-nav{display:flex;gap:0;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:65px;z-index:19;}
.main-nav button{flex:1;padding:13px;background:none;border:none;font-family:'Cairo',sans-serif;font-size:14px;font-weight:800;color:var(--muted);border-bottom:3px solid transparent;transition:all .2s;}
.main-nav button.active{color:var(--green);border-bottom-color:var(--green);}

.dash-body{max-width:900px;margin:0 auto;padding:20px;}
.main-section{display:none;}
.main-section.active{display:block;}

.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;text-align:center;}
.stat-num{font-size:26px;font-weight:900;color:var(--green);line-height:1;margin-bottom:6px;}
.stat-num.red{color:var(--red);}
.stat-num.gold{color:var(--gold);}
.stat-label{font-size:11.5px;color:var(--muted);font-weight:700;}

.section-title{font-size:15px;font-weight:800;margin:22px 0 12px;display:flex;align-items:center;gap:8px;}

.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.filters select{flex:1;min-width:130px;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:10px;font-family:'Cairo',sans-serif;font-size:13px;color:var(--text);}

.breadcrumb-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;font-size:13px;font-weight:700;color:var(--muted);flex-wrap:wrap;}
.breadcrumb-bar button{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:12.5px;font-weight:800;color:var(--green);}
.breadcrumb-bar span.sep{color:var(--border);}
.breadcrumb-bar span.current{color:var(--text);}

.grades-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:12px;}
.grade-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px 10px;text-align:center;transition:transform .15s,box-shadow .15s;position:relative;}
.grade-box:active{transform:scale(.96);}
.grade-box:hover{box-shadow:0 8px 20px rgba(0,0,0,.06);}
.grade-box .gnum{font-size:26px;font-weight:900;color:var(--text);}
.grade-box .glabel{font-size:11px;color:var(--muted);font-weight:700;margin-top:2px;}
.grade-box .gbadge{position:absolute;top:-6px;left:-6px;background:var(--red);color:#fff;border-radius:99px;min-width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;padding:0 6px;}
.grade-box .gbadge.zero{background:var(--green2);}

.classes-bar{display:flex;gap:8px;overflow-x:auto;margin-bottom:18px;padding-bottom:4px;}
.class-chip{flex-shrink:0;background:var(--surface);border:1.5px solid var(--border);border-radius:99px;padding:9px 18px;font-size:13px;font-weight:800;color:var(--text);white-space:nowrap;display:flex;align-items:center;gap:6px;}
.class-chip.active{background:linear-gradient(135deg,var(--green),var(--green2));border-color:var(--green);color:#fff;}
.class-chip .cb{background:rgba(0,0,0,.08);border-radius:99px;padding:1px 7px;font-size:10.5px;}
.class-chip.active .cb{background:rgba(255,255,255,.25);}

.students-table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.students-table{width:100%;border-collapse:collapse;font-size:13px;}
.students-table th{background:var(--card);color:var(--muted);font-weight:800;padding:10px 12px;text-align:right;font-size:11.5px;border-bottom:1px solid var(--border);}
.students-table td{padding:11px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
.students-table tr:last-child td{border-bottom:none;}
.student-name-cell{font-weight:800;}
.violation-types-list{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}
.vtype-badge{background:rgba(192,57,43,.08);color:var(--red);border-radius:99px;padding:2px 9px;font-size:10.5px;font-weight:700;}
.vcount-badge{background:var(--red);color:#fff;border-radius:99px;padding:3px 11px;font-size:12.5px;font-weight:800;display:inline-block;min-width:26px;text-align:center;}
.official-report-btn{background:var(--surface);border:1.5px solid var(--gold);color:var(--gold);border-radius:9px;padding:7px 12px;font-size:11.5px;font-weight:800;white-space:nowrap;display:flex;align-items:center;gap:5px;}
.official-report-btn:active{transform:scale(.95);}

.empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:14px;}
.loading{text-align:center;color:var(--muted);padding:40px;}

.bar-list-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.bar-list-row:last-child{border-bottom:none;}
.bar-list-row .blabel{font-size:12.5px;font-weight:800;width:110px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-list-row .btrack{flex:1;background:var(--card);border-radius:99px;height:18px;overflow:hidden;}
.bar-list-row .bfill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--green),var(--green2));}
.bar-list-row .bval{font-size:12px;font-weight:800;color:var(--text);width:28px;text-align:left;flex-shrink:0;}
.analytics-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px;}
.mini-trend{display:flex;align-items:flex-end;gap:3px;height:80px;margin-top:10px;}
.mini-trend .tcol{flex:1;background:linear-gradient(180deg,var(--green2),var(--green));border-radius:4px 4px 0 0;min-height:3px;position:relative;}
.mini-trend .tcol .tlabel{position:absolute;bottom:-18px;left:0;right:0;text-align:center;font-size:8.5px;color:var(--muted);font-weight:700;}
</style>
</head>
<body>

<div class="login-wrap" id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <svg viewBox="0 0 24 24" fill="#fff" width="32" height="32"><path d="M12 3 1 9l11 6 9-4.91V17h2V9L12 3zM5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82z"/></svg>
    </div>
    <div class="login-title">إدارة المدرسة</div>
    <div class="login-sub">لوحة متابعة مخالفات الطلاب</div>
    <div class="login-err" id="login-err"></div>
    <div class="login-field">
      <label>اسم المستخدم</label>
      <input type="text" id="login-user" dir="ltr" style="text-align:right" placeholder="اسم المستخدم" autocomplete="username"/>
    </div>
    <div class="login-field">
      <label>كلمة المرور</label>
      <input type="password" id="login-pass" dir="ltr" style="text-align:right" placeholder="كلمة المرور" autocomplete="current-password"/>
    </div>
    <button class="login-btn" id="login-btn" onclick="doLogin()">دخول</button>
  </div>
</div>

<div class="dash" id="dashboard">
  <div class="dash-header">
    <div class="dash-school" id="dash-school-name">
      <svg viewBox="0 0 24 24" fill="var(--green)" width="20" height="20"><path d="M12 3 1 9l11 6 9-4.91V17h2V9L12 3z"/></svg>
      <span>—</span>
    </div>
    <button class="dash-logout" onclick="doLogout()">خروج</button>
  </div>

  <div class="main-nav">
    <button id="nav-grades" class="active" onclick="switchMainSection('grades')">📚 الصفوف</button>
    <button id="nav-stats" onclick="switchMainSection('stats')">📊 الإحصائيات</button>
  </div>

  <div class="dash-body">
    <div class="main-section active" id="section-grades">
      <div class="filters">
        <select id="filter-period" onchange="onFilterChange()">
          <option value="all">كل الفترات</option>
          <option value="today">اليوم</option>
          <option value="week">آخر 7 أيام</option>
          <option value="month">آخر 30 يوم</option>
        </select>
        <select id="filter-type" onchange="onFilterChange()">
          <option value="">كل أنواع المخالفات</option>
        </select>
      </div>

      <div class="breadcrumb-bar" id="breadcrumb-bar"></div>

      <div id="grades-grid-view"><div class="loading">⏳ جاري التحميل...</div></div>

      <div id="classes-bar-view" style="display:none">
        <div class="classes-bar" id="classes-bar"></div>
      </div>

      <div id="students-table-view" style="display:none">
        <div class="students-table-wrap">
          <table class="students-table">
            <thead><tr><th>الطالب</th><th>عدد المخالفات</th><th>الأنواع</th><th></th></tr></thead>
            <tbody id="students-table-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="main-section" id="section-stats">
      <div class="stats-row" id="stats-row-main"></div>

      <div class="analytics-card">
        <div class="section-title" style="margin-top:0">
          <svg viewBox="0 0 24 24" fill="var(--gold)" width="16" height="16"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
          المخالفات حسب الصفوف
        </div>
        <div id="analytics-by-grade"></div>
      </div>

      <div class="analytics-card">
        <div class="section-title" style="margin-top:0">
          <svg viewBox="0 0 24 24" fill="var(--red)" width="16" height="16"><path d="M12 2 2 7v10l10 5 10-5V7L12 2z"/></svg>
          أكثر أنواع المخالفات
        </div>
        <div id="analytics-by-type"></div>
      </div>

      <div class="analytics-card">
        <div class="section-title" style="margin-top:0">
          <svg viewBox="0 0 24 24" fill="var(--green)" width="16" height="16"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          المعلمون الأكثر تسجيلاً
        </div>
        <div id="analytics-by-teacher"></div>
      </div>

      <div class="analytics-card">
        <div class="section-title" style="margin-top:0">
          <svg viewBox="0 0 24 24" fill="var(--green2)" width="16" height="16"><path d="M3 3h2v16h16v2H3V3zm15.3 3.3 1.4 1.4-4.7 4.7-3-3-4 4-1.4-1.4 5.4-5.4 3 3 3.3-3.3z"/></svg>
          الاتجاه — آخر 14 يوماً
        </div>
        <div class="mini-trend" id="trend-chart" style="margin-bottom:18px"></div>
      </div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL='https://mkdsnnfkkdwdkywnwnjh.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1rZHNubmZra2R3ZGt5d253bmpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMDk0MDgsImV4cCI6MjA5NDU4NTQwOH0.girscgcDBxUi2O1kWjD5Q_Uc-6bJZEtuAa_tpZlazQo';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

let currentSchool=null;
let allViolations=[];
let activeGrade=null;
let activeClass=null;

function escHtml(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

function saveSession(school){try{localStorage.setItem('kh_admin_session',JSON.stringify({id:school.id,name:school.name,username:school.username}));}catch(e){}}
function loadSession(){try{const r=localStorage.getItem('kh_admin_session');return r?JSON.parse(r):null;}catch(e){return null;}}
function clearSession(){try{localStorage.removeItem('kh_admin_session');}catch(e){}}

async function doLogin(){
  const username=document.getElementById('login-user').value.trim().toLowerCase();
  const password=document.getElementById('login-pass').value.trim();
  const err=document.getElementById('login-err');
  const btn=document.getElementById('login-btn');
  err.style.display='none';
  if(!username||!password){err.textContent='أدخل اسم المستخدم وكلمة المرور';err.style.display='block';return;}
  btn.disabled=true;btn.textContent='⏳ جاري الدخول...';
  try{
    const{data,error}=await sb.from('schools').select('*').eq('username',username).maybeSingle();
    if(error){err.textContent='تعذّر الاتصال، حاول مجدداً';err.style.display='block';return;}
    if(!data||data.password!==password){
      err.textContent='اسم المستخدم أو كلمة المرور غير صحيحة';err.style.display='block';
      return;
    }
    currentSchool=data;
    saveSession(data);
    showDashboard();
  }catch(e){
    err.textContent='حدث خطأ، حاول مجدداً';err.style.display='block';
  }finally{
    btn.disabled=false;btn.textContent='دخول';
  }
}
function doLogout(){
  if(!confirm('تسجيل الخروج؟'))return;
  clearSession();
  currentSchool=null;allViolations=[];
  document.getElementById('dashboard').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('login-user').value='';
  document.getElementById('login-pass').value='';
}

async function showDashboard(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('dashboard').style.display='block';
  document.querySelector('#dash-school-name span').textContent=currentSchool.name;
  await loadViolations();
}

async function loadViolations(){
  document.getElementById('grades-grid-view').innerHTML='<div class="loading">⏳ جاري التحميل...</div>';
  try{
    const{data,error}=await sb.from('violations').select('*').eq('school_id',currentSchool.id).order('created_at',{ascending:false});
    if(error){document.getElementById('grades-grid-view').innerHTML='<div class="empty">❌ تعذّر تحميل البيانات</div>';return;}
    allViolations=data||[];
    const types=[...new Set(allViolations.map(v=>v.violation_type).filter(Boolean))];
    const typeSel=document.getElementById('filter-type');
    typeSel.innerHTML='<option value="">كل أنواع المخالفات</option>'+types.map(t=>`<option value="${escHtml(t)}">${escHtml(t)}</option>`).join('');
    activeGrade=null;activeClass=null;
    renderBreadcrumb();
    renderGradesGrid();
    renderStatsSection();
  }catch(e){
    document.getElementById('grades-grid-view').innerHTML='<div class="empty">❌ حدث خطأ</div>';
  }
}

function switchMainSection(name){
  document.getElementById('nav-grades').classList.toggle('active',name==='grades');
  document.getElementById('nav-stats').classList.toggle('active',name==='stats');
  document.getElementById('section-grades').classList.toggle('active',name==='grades');
  document.getElementById('section-stats').classList.toggle('active',name==='stats');
  if(name==='stats')renderStatsSection();
}

function getFilteredViolations(){
  let v=allViolations;
  const period=document.getElementById('filter-period').value;
  const type=document.getElementById('filter-type').value;
  if(period!=='all'){
    const now=new Date();
    let cutoff=new Date();
    if(period==='today')cutoff.setHours(0,0,0,0);
    else if(period==='week')cutoff.setDate(now.getDate()-7);
    else if(period==='month')cutoff.setDate(now.getDate()-30);
    v=v.filter(x=>new Date(x.created_at)>=cutoff);
  }
  if(type)v=v.filter(x=>x.violation_type===type);
  return v;
}
function onFilterChange(){
  renderGradesGrid();
  if(activeGrade)renderClassesBar(activeGrade);
  if(activeGrade&&activeClass)renderStudentsTable(activeGrade,activeClass);
  renderStatsSection();
}

function renderBreadcrumb(){
  const bar=document.getElementById('breadcrumb-bar');
  let html=`<button onclick="goToGradesRoot()">📚 كل الصفوف</button>`;
  if(activeGrade){
    html+=`<span class="sep">←</span>`;
    html+=activeClass?`<button onclick="selectGrade('${activeGrade}')">الصف ${escHtml(activeGrade)}</button>`:`<span class="current">الصف ${escHtml(activeGrade)}</span>`;
  }
  if(activeClass){
    html+=`<span class="sep">←</span><span class="current">شعبة ${escHtml(activeClass)}</span>`;
  }
  bar.innerHTML=html;
}
function goToGradesRoot(){
  activeGrade=null;activeClass=null;
  document.getElementById('classes-bar-view').style.display='none';
  document.getElementById('students-table-view').style.display='none';
  document.getElementById('grades-grid-view').style.display='block';
  renderBreadcrumb();
  renderGradesGrid();
}

function renderGradesGrid(){
  const container=document.getElementById('grades-grid-view');
  const violations=getFilteredViolations();
  const structure=(currentSchool&&currentSchool.structure)||{};
  const gradeSet=new Set(Object.keys(structure));
  violations.forEach(v=>{if(v.grade)gradeSet.add(String(v.grade));});
  const grades=[...gradeSet].sort((a,b)=>{
    const na=parseInt(a),nb=parseInt(b);
    if(isNaN(na))return 1;if(isNaN(nb))return -1;
    return na-nb;
  });
  if(!grades.length){
    container.innerHTML='<div class="empty">📭 لا توجد صفوف مسجّلة بعد<br><small>أضف صفوفاً وشعباً عند إنشاء المدرسة</small></div>';
    return;
  }
  container.innerHTML='<div class="grades-grid">'+grades.map(g=>{
    const count=violations.filter(v=>String(v.grade)===g).length;
    const badgeClass=count===0?'zero':'';
    return `<div class="grade-box" onclick="selectGrade('${g}')">
      ${count>0?`<div class="gbadge ${badgeClass}">${count}</div>`:''}
      <div class="gnum">${escHtml(g)}</div>
      <div class="glabel">الصف</div>
    </div>`;
  }).join('')+'</div>';
}

function selectGrade(grade){
  activeGrade=grade;activeClass=null;
  document.getElementById('grades-grid-view').style.display='none';
  document.getElementById('students-table-view').style.display='none';
  document.getElementById('classes-bar-view').style.display='block';
  renderBreadcrumb();
  renderClassesBar(grade);
}
function renderClassesBar(grade){
  const bar=document.getElementById('classes-bar');
  const violations=getFilteredViolations();
  const structure=(currentSchool&&currentSchool.structure)||{};
  const classSet=new Set(structure[grade]||[]);
  violations.filter(v=>String(v.grade)===grade).forEach(v=>{if(v.class_name)classSet.add(v.class_name);});
  const classes=[...classSet].sort((a,b)=>a.localeCompare(b,'ar'));
  if(!classes.length){
    bar.innerHTML='<div class="empty">لا توجد شعب مسجّلة لهذا الصف</div>';
    return;
  }
  bar.innerHTML=classes.map(c=>{
    const count=violations.filter(v=>String(v.grade)===grade&&v.class_name===c).length;
    return `<button class="class-chip ${c===activeClass?'active':''}" onclick="selectClass('${grade}','${c.replace(/'/g,"\\'")}')">${escHtml(c)} <span class="cb">${count}</span></button>`;
  }).join('');
  if(!activeClass)selectClass(grade,classes[0]);
}
function selectClass(grade,cls){
  activeGrade=grade;activeClass=cls;
  document.getElementById('students-table-view').style.display='block';
  renderBreadcrumb();
  renderClassesBar(grade);
  renderStudentsTable(grade,cls);
}

function renderStudentsTable(grade,cls){
  const tbody=document.getElementById('students-table-body');
  const violations=getFilteredViolations().filter(v=>String(v.grade)===grade&&v.class_name===cls);
  if(!violations.length){
    tbody.innerHTML='<tr><td colspan="4"><div class="empty">✅ لا توجد مخالفات مسجّلة لهذه الشعبة</div></td></tr>';
    return;
  }
  const byStudent={};
  violations.forEach(v=>{
    const name=v.student_name||'غير معروف';
    if(!byStudent[name])byStudent[name]={count:0,types:{}};
    byStudent[name].count++;
    byStudent[name].types[v.violation_type]=(byStudent[name].types[v.violation_type]||0)+1;
  });
  const students=Object.entries(byStudent).sort((a,b)=>b[1].count-a[1].count);
  tbody.innerHTML=students.map(([name,info])=>{
    const typesBadges=Object.entries(info.types).map(([t,c])=>`<span class="vtype-badge">${escHtml(t)}${c>1?` ×${c}`:''}</span>`).join('');
    return `<tr>
      <td class="student-name-cell">${escHtml(name)}</td>
      <td><span class="vcount-badge">${info.count}</span></td>
      <td><div class="violation-types-list">${typesBadges}</div></td>
      <td><button class="official-report-btn" onclick="reportOfficialViolation('${escHtml(name).replace(/'/g,"\\'")}','${grade}','${cls.replace(/'/g,"\\'")}')">
        <svg viewBox="0 0 24 24" fill="currentColor" width="13" height="13"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
        رفع مخالفة رسمية
      </button></td>
    </tr>`;
  }).join('');
}
function reportOfficialViolation(studentName,grade,cls){
  alert(`سيتم لاحقاً إعداد آلية "المخالفة الرسمية" لـ: ${studentName} (الصف ${grade} - ${cls})`);
}

function renderStatsSection(){
  const violations=getFilteredViolations();
  renderMainStatsCards(violations);
  renderAnalyticsByGrade(violations);
  renderAnalyticsByType(violations);
  renderAnalyticsByTeacher(violations);
  renderTrendChart();
}
function renderMainStatsCards(violations){
  const total=violations.length;
  const students=new Set(violations.map(v=>v.student_name)).size;
  const grades=new Set(violations.map(v=>v.grade)).size;
  const classes=new Set(violations.map(v=>v.class_name)).size;
  const teachers=new Set(violations.map(v=>v.teacher_name).filter(Boolean)).size;
  const typeCounts={};
  violations.forEach(v=>{typeCounts[v.violation_type]=(typeCounts[v.violation_type]||0)+1;});
  const topType=Object.entries(typeCounts).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById('stats-row-main').innerHTML=`
    <div class="stat-card"><div class="stat-num red">${total}</div><div class="stat-label">إجمالي المخالفات</div></div>
    <div class="stat-card"><div class="stat-num gold">${students}</div><div class="stat-label">طالب مخالف</div></div>
    <div class="stat-card"><div class="stat-num">${grades}</div><div class="stat-label">صف متأثر</div></div>
    <div class="stat-card"><div class="stat-num">${classes}</div><div class="stat-label">شعبة متأثرة</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--green2)">${teachers}</div><div class="stat-label">معلم مُبلِغ</div></div>
    <div class="stat-card"><div class="stat-num" style="font-size:14px;padding-top:6px">${topType?escHtml(topType[0]):'—'}</div><div class="stat-label">الأكثر تكراراً${topType?` (${topType[1]})`:''}</div></div>
  `;
}
function renderBarList(containerId,entries,maxItems){
  const container=document.getElementById(containerId);
  if(!entries.length){container.innerHTML='<div class="empty" style="padding:20px">لا توجد بيانات</div>';return;}
  const sorted=entries.sort((a,b)=>b[1]-a[1]).slice(0,maxItems||8);
  const max=sorted[0][1]||1;
  container.innerHTML=sorted.map(([label,count])=>{
    const pct=Math.round(count/max*100);
    return `<div class="bar-list-row">
      <div class="blabel">${escHtml(label)}</div>
      <div class="btrack"><div class="bfill" style="width:${pct}%"></div></div>
      <div class="bval">${count}</div>
    </div>`;
  }).join('');
}
function renderAnalyticsByGrade(violations){
  const counts={};
  violations.forEach(v=>{const g='الصف '+(v.grade||'؟');counts[g]=(counts[g]||0)+1;});
  renderBarList('analytics-by-grade',Object.entries(counts),12);
}
function renderAnalyticsByType(violations){
  const counts={};
  violations.forEach(v=>{const t=v.violation_type||'غير محدد';counts[t]=(counts[t]||0)+1;});
  renderBarList('analytics-by-type',Object.entries(counts),8);
}
function renderAnalyticsByTeacher(violations){
  const counts={};
  violations.forEach(v=>{const t=v.teacher_name||'غير معروف';counts[t]=(counts[t]||0)+1;});
  renderBarList('analytics-by-teacher',Object.entries(counts),8);
}
function renderTrendChart(){
  const container=document.getElementById('trend-chart');
  const days=[];
  for(let i=13;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    days.push({key:d.toDateString(),label:d.toLocaleDateString('ar-OM',{day:'numeric'})});
  }
  const counts={};
  allViolations.forEach(v=>{
    const d=new Date(v.created_at).toDateString();
    counts[d]=(counts[d]||0)+1;
  });
  const max=Math.max(1,...days.map(d=>counts[d.key]||0));
  container.innerHTML=days.map(d=>{
    const c=counts[d.key]||0;
    const h=Math.max(3,Math.round(c/max*62));
    return `<div class="tcol" style="height:${h}px" title="${c} مخالفة"><span class="tlabel">${d.label}</span></div>`;
  }).join('');
}

document.getElementById('login-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('login-user').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('login-pass').focus();});

(async()=>{
  const session=loadSession();
  if(session&&session.id){
    try{
      const{data}=await sb.from('schools').select('*').eq('id',session.id).maybeSingle();
      if(data){currentSchool=data;showDashboard();return;}
    }catch(e){}
    clearSession();
  }
})();
</script>
