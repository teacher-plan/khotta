# نشر دوال Supabase تلقائياً عند أي تغيير في مجلد الدوال
# يتطلب سراً واحداً في GitHub: SUPABASE_ACCESS_TOKEN
name: Deploy Supabase Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all functions
        run: supabase functions deploy --project-ref mkdsnnfkkdwdkywnwnjh
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
